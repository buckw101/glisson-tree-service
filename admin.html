<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>CRM — Glisson Tree Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a3d28'/><text y='24' x='5' font-size='22'>🌳</text></svg>" />
</head>
<body>

<!-- ═══════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">🌳</div>
      <h1>Glisson Tree Service</h1>
      <p>CRM Dashboard</p>
    </div>
    <div class="login-field">
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" />
    </div>
    <button class="login-btn" id="loginBtn">Sign In →</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ═══════════════════════════════════
     DASHBOARD
════════════════════════════════════ -->
<div id="dashboard">

  <!-- Loading bar -->
  <div id="loadingBar"></div>

  <!-- HEADER -->
  <header class="crm-header">
    <div class="crm-brand">
      <span class="crm-brand-icon">🌳</span>
      <span class="crm-brand-name">Glisson CRM</span>
    </div>
    <div class="crm-header-right">
      <div class="crm-search-wrap">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search…" autocomplete="off" />
      </div>
      <button class="btn-add" id="addLeadBtn">＋ Lead</button>
      <button class="btn-refresh" id="refreshBtn" title="Refresh">↻</button>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-num" id="statTotal">—</div>
      <div class="stat-lbl">Total</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statPipeline">—</div>
      <div class="stat-lbl">Pipeline</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statBookRate">—</div>
      <div class="stat-lbl">Booking Rate</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statAvgJob">—</div>
      <div class="stat-lbl">Avg Job</div>
    </div>
  </div>

  <!-- STAGE TABS (mobile) / hidden on desktop -->
  <div class="stage-tabs" id="stageTabs"></div>

  <!-- MAIN CONTENT -->
  <div class="crm-body">

    <!-- SIDEBAR (desktop only) -->
    <aside class="sidebar">
      <div class="sidebar-section-label">Filter by Service</div>
      <div class="service-filters">
        <button class="filter-chip active" data-filter="all">All Services</button>
        <button class="filter-chip" data-filter="tree removal">🌳 Tree Removal</button>
        <button class="filter-chip" data-filter="trimming">✂️ Trimming</button>
        <button class="filter-chip" data-filter="emergency">🚨 Emergency</button>
        <button class="filter-chip" data-filter="stump">🪵 Stump Grinding</button>
        <button class="filter-chip" data-filter="lot clearing">🚜 Lot Clearing</button>
      </div>
      <div class="sidebar-divider"></div>
      <a href="index.html" class="sidebar-website-link">← View Website</a>
      <button class="sidebar-logout" id="logoutBtn">Sign Out</button>
    </aside>

    <!-- PIPELINE BOARD (desktop) / CARD LIST (mobile) -->
    <div class="pipeline-wrap">

      <!-- Mobile service filter chips -->
      <div class="mobile-filters">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="tree removal">🌳 Removal</button>
        <button class="filter-chip" data-filter="trimming">✂️ Trimming</button>
        <button class="filter-chip" data-filter="emergency">🚨 Emergency</button>
        <button class="filter-chip" data-filter="stump">🪵 Stump</button>
        <button class="filter-chip" data-filter="lot clearing">🚜 Clearing</button>
      </div>

      <!-- Board: columns injected by JS on desktop, single list on mobile -->
      <div class="pipeline-board" id="pipelineBoard"></div>
    </div>

  </div><!-- .crm-body -->

  <!-- Mobile FAB -->
  <button class="fab" id="fabAddBtn">＋</button>

</div><!-- #dashboard -->

<!-- ═══════════════════════════════════
     DETAIL PANEL
════════════════════════════════════ -->
<div class="detail-backdrop" id="detailBackdrop"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <div>
      <div class="detail-name" id="detailName">—</div>
      <div class="detail-service" id="detailService">—</div>
    </div>
    <button class="detail-close" id="closeDetail">✕</button>
  </div>

  <div class="detail-body">

    <div class="detail-section">
      <a class="detail-call-btn" id="detailCallBtn" href="#">📞 Call Now</a>
    </div>

    <div class="detail-section">
      <div class="detail-row"><span class="dl">Phone</span><span class="dv" id="detailPhone">—</span></div>
      <div class="detail-row"><span class="dl">Email</span><span class="dv" id="detailEmail">—</span></div>
      <div class="detail-row"><span class="dl">Source</span><span class="dv" id="detailSource">—</span></div>
      <div class="detail-row"><span class="dl">Date</span><span class="dv" id="detailDate">—</span></div>
      <div class="detail-row detail-row-block"><span class="dl">Message</span><span class="dv dv-msg" id="detailMessage">—</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Move to Stage</div>
      <div class="stage-btn-group" id="stageBtnGroup">
        <button class="stage-btn" data-stage="new">New Lead</button>
        <button class="stage-btn" data-stage="contacted">Contacted</button>
        <button class="stage-btn" data-stage="scheduled">Est. Scheduled</button>
        <button class="stage-btn" data-stage="quoted">Estimate Given</button>
        <button class="stage-btn" data-stage="booked">Job Booked</button>
        <button class="stage-btn" data-stage="completed">Completed</button>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Priority</div>
      <div class="priority-btn-group">
        <button class="priority-btn" data-priority="normal">Normal</button>
        <button class="priority-btn" data-priority="high">🟠 High</button>
        <button class="priority-btn" data-priority="urgent">🔴 Urgent</button>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Est. Job Value ($)</div>
      <input class="detail-input" id="detailValue" type="number" placeholder="0" min="0" />
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Notes</div>
      <textarea class="detail-notes" id="detailNotes" placeholder="Quote given, follow-up date, job details…"></textarea>
      <button class="btn-save-notes" id="saveNotes">Save Notes &amp; Value</button>
    </div>

    <div class="detail-danger">
      <button class="btn-delete" id="deleteLead">🗑 Remove Lead</button>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════
     ADD LEAD MODAL
════════════════════════════════════ -->
<div class="modal-backdrop" id="addLeadModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Lead</h2>
      <button class="modal-close" id="cancelAddLead">✕</button>
    </div>
    <form id="addLeadForm">
      <div class="modal-body">
        <div class="modal-row">
          <div class="modal-group">
            <label>Full Name *</label>
            <input name="name" placeholder="Jane Smith" required />
          </div>
          <div class="modal-group">
            <label>Phone *</label>
            <input name="phone" placeholder="(478) 000-0000" required inputmode="tel" />
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-group">
            <label>Email</label>
            <input name="email" type="email" placeholder="jane@email.com" />
          </div>
          <div class="modal-group">
            <label>Est. Job Value ($)</label>
            <input name="value" type="number" placeholder="0" min="0" inputmode="numeric" />
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-group">
            <label>Service</label>
            <select name="service">
              <option value="Tree Removal">Tree Removal</option>
              <option value="Tree Trimming">Tree Trimming</option>
              <option value="Emergency Service">Emergency Service</option>
              <option value="Stump Grinding">Stump Grinding</option>
              <option value="Lot Clearing">Lot Clearing</option>
              <option value="Storm Cleanup">Storm Cleanup</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="modal-group">
            <label>Source</label>
            <select name="source">
              <option value="Phone Call">Phone Call</option>
              <option value="Website Form">Website Form</option>
              <option value="Referral">Referral</option>
              <option value="Manual Entry">Manual Entry</option>
            </select>
          </div>
        </div>
        <div class="modal-group">
          <label>Notes</label>
          <textarea name="message" placeholder="Job details, address, anything relevant…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" id="cancelAddLead2">Cancel</button>
        <button type="submit">Add to Pipeline →</button>
      </div>
    </form>
  </div>
</div>

<script src="admin.js"></script>
<script>
  document.getElementById('cancelAddLead2').addEventListener('click', () => {
    document.getElementById('addLeadModal').classList.remove('open');
    document.getElementById('addLeadForm').reset();
  });
  document.getElementById('fabAddBtn').addEventListener('click', () => {
    document.getElementById('addLeadModal').classList.add('open');
  });
  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    sessionStorage.removeItem('crm_auth');
    location.reload();
  });
</script>
</body>
</html>
